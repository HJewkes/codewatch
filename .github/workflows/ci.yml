name: CI

on:
  push:
    branches: [main]
  pull_request:

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  ci:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - uses: pnpm/action-setup@v4
        with:
          version: 9
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: pnpm
      - run: pnpm install --frozen-lockfile
      - run: pnpm -r build
      - run: pnpm -r typecheck
      - run: pnpm test
      - name: Architectural fitness check
        run: |
          node packages/cli/dist/index.js graph index packages \
            --db .codewatch/graph.db --ref ci
          node packages/cli/dist/index.js graph check \
            --db .codewatch/graph.db --config .codewatch/check.json
