name: CI

on:
  push:
    branches: [main]
  pull_request:

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  ci:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
        with:
          fetch-depth: 0
      - uses: pnpm/action-setup@v6
      - uses: actions/setup-node@v6
        with:
          node-version: 22
          # No pnpm cache here: setup-node@v6 keys the store cache on lockfile
          # hash only. When the runtime Node version changes, the cached
          # native-module binaries (better-sqlite3) become ABI-mismatched and
          # subsequent installs reuse them without rebuilding. Disable until
          # the cache action also keys on Node version.
      - run: pnpm install --frozen-lockfile
      - run: pnpm -r build
      - run: pnpm -r typecheck
      - run: pnpm --filter @codewatch/render exec playwright install --with-deps chromium
      - run: pnpm test
      - name: Architectural fitness check
        env:
          BASE_REF: ${{ github.event_name == 'pull_request' && github.base_ref || 'main' }}
        run: |
          # Index head into the shared DB.
          node packages/cli/dist/index.js graph index packages \
            --db .codewatch/graph.db --ref head
          # Index baseline (the PR target, or main on a push) from a separate
          # worktree using the same CLI build.
          git worktree add /tmp/baseline "origin/$BASE_REF"
          node packages/cli/dist/index.js graph index /tmp/baseline/packages \
            --db .codewatch/graph.db --ref baseline
          # Fail only on *new* violations — carryover errors are tolerated.
          # Pin the checked snapshot to head explicitly: both head and baseline
          # live in the shared DB, so the default (latest snapshot) would pick
          # baseline — checking baseline-vs-baseline and never seeing head's
          # new violations. --snapshot head compares the right pair regardless
          # of index order.
          node packages/cli/dist/index.js graph check \
            --db .codewatch/graph.db --config .codewatch/check.json \
            --snapshot head --baseline baseline
